[pytest]
env_files = .env
# log_cli = true
# log_cli_level = DEBUG
# log_format = %(asctime)s %(levelname)s %(message)s
# log_date_format = %H:%M:%S

pythonpath = .

addopts = --browser chromium --browser firefox --browser webkit

markers = 
    api: API autotests
    ui: UI autotests
    admin_session: Admin logs in before the tests
    api_version(name): Backend version tag for tests (e.g. with_database)
    fraud_check_mock(**kwargs): Start local mock FraudCheck service for the test. Example: @pytest.mark.fraud_check_mock(port=8080, endpoint=r"/.*", decision="APPROVED", riskScore=0.2, reason="Low risk")
    prepare_users(number): Prepare N users via admin API and expose them as fixtures (prepared_users/prepared_user_accounts)
    prepare_accounts(number, deposit): Prepare N accounts for prepared users
    user_session(count): User logs in before the tests with *count* value of users in environment
    browsers(names): Tests for only current browsers (chromium|firefox|webkit)
    check_all_users_change(delta, username_source, should_exist): Do GET /admin/users before and after the test and assert delta/existence.
    check_accounts_change(delta): Do GET /customer/accounts before and after the test and assert delta.
    check_transactions_count(account_id_source, expected_before, expected_after): Check transactions count before and after the test.
    check_deposit_transaction_match(account_id_source): Check that deposit transaction matches get_transactions response.
    check_transfer_transaction(receiver_user_source, receiver_account_id_source, sender_account_id_source): Check transfer transaction for receiver account.
    check_profile_name(expected_before, expected_after_source, expected_after): Check profile name before and after the test.
    entity_will_be_created(*sources): Add entity/entities to created_objects for cleanup. Example: @pytest.mark.entity_will_be_created("new_user_request")
