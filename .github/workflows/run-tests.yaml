name: Run tests

on:
  workflow_dispatch:
    inputs:
      api_version:
        description: "Backend version tag (matches @pytest.mark.api_version(..))"
        required: true
        type: choice
        options:
          - with_database
          - with_fraud_check
      suite:
        description: "Which suite to run"
        required: true
        type: choice
        options:
          - api
          - ui
          - api+ui
        default: "api+ui"
      markers:
        description: "Additional pytest markers"
        required: false
        default: ""
      backend_tag:
        description: "Docker image tag for backend"
        required: true
        type: choice
        options:
          - with_database_with_fix
          - with_fraud_check
          - preprod_version
        default: "preprod_version"
      num_threads:
        description: "Number of parallel threads (default: 4)"
        required: false
        type: string
        default: "4"
      min_swagger_coverage:
        description: "Fail job if Swagger API coverage is below this percent (quality gate)"
        required: false
        type: string
        default: "50"
  push:
    branches: [ main, master, tests-in-pipeline, reports ]
    paths:
      - 'src/**'
      - 'swagger_coverage.py'
      - 'conftest.py'
      - 'Dockerfile'
      - '.github/workflows/**'
      - 'scripts/**'

jobs:
  run:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Checkstyle (flake8)
        run: |
          flake8 src/ --count --statistics

      - name: Start services
        env:
          BACKEND_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.backend_tag || 'preprod_version' }}
        run: |
          export NBANK_BACKEND_IMAGE="nobugsme/nbank:${BACKEND_TAG}"
          docker compose -f infra/docker-compose/docker-compose.yaml up -d

          docker compose -f infra/docker-compose/docker-compose.yaml logs -f backend &
          LOGS_PID=$!

          echo "Waiting for backend to be ready..."
          SECONDS=0
          until curl -sf "http://localhost:4111/actuator/health" >/dev/null 2>&1; do
            sleep 20
            if [ "$SECONDS" -ge 400 ]; then
              echo "Backend did not start within 400 seconds. Aborting tests."
              kill "$LOGS_PID" >/dev/null 2>&1 || true
              exit 1
            fi
            echo "Backend is not ready yet, healthcheck is unavailable..."
          done

          kill "$LOGS_PID" >/dev/null 2>&1 || true

      - name: Run pytest
        env:
          UI_BASE_URL: http://localhost:3000
          DB_HOST: localhost
          API_VERSION_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.api_version || 'with_database' }}
          SUITE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.suite || 'api+ui' }}
          MARKERS_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.markers || '' }}
          NUM_THREADS_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.num_threads || '4' }}
          SWAGGER_URL: http://localhost:4111/v3/api-docs
          SWAGGER_COVERAGE_REPORT: "0"
        run: |
          set -eux
          
          mkdir -p target/allure-results
          mkdir -p target/swagger-coverage-output
          
          API_VERSION_INPUT="${API_VERSION_INPUT:-with_database}"
          SUITE_INPUT="${SUITE_INPUT:-api+ui}"
          MARKERS="${MARKERS_INPUT:-}"
          NUM_THREADS="${NUM_THREADS_INPUT:-4}"
          
          M_OPT=""
          N_OPT="-n $NUM_THREADS"
          
          if [ -n "$MARKERS" ]; then
            M_OPT="-m $MARKERS"
          fi
          
          if [ "$SUITE_INPUT" = "api" ]; then
            pytest -m api --api-version "$API_VERSION_INPUT" $M_OPT $N_OPT -q --alluredir=target/allure-results
          elif [ "$SUITE_INPUT" = "ui" ]; then
            pytest -m ui $M_OPT $N_OPT -q --alluredir=target/allure-results
          else
            pytest -m api --api-version "$API_VERSION_INPUT" $M_OPT $N_OPT -q --alluredir=target/allure-results
            pytest -m ui $M_OPT $N_OPT -q --alluredir=target/allure-results
          fi

      - name: Generate Swagger Coverage Report
        if: always()
        env:
          SWAGGER_URL: http://localhost:4111/v3/api-docs
        run: |
          echo "Generating Swagger coverage report..."
          python -c "
          from swagger_coverage import get_swagger_coverage
          import os
          coverage = get_swagger_coverage()
          swagger_url = os.getenv('SWAGGER_URL', 'http://localhost:4111/v3/api-docs')
          report = coverage.generate_report(swagger_url)
          print(f'Report generated: {report}')
          "

      - name: Load test report history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate allure report
        if: always()
        env:
          ALLURE_VER: '2.27.0'
        run: |
          set -eux
          RUN="${{ github.run_number }}"
          wget -q "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VER}/allure-${ALLURE_VER}.tgz"
          tar -xzf "allure-${ALLURE_VER}.tgz"

          # История трендов из gh-pages (если уже публиковали)
          if [[ -d gh-pages/history ]]; then
            mkdir -p target/allure-results/history
            cp -r gh-pages/history/. target/allure-results/history/ || true
          else
            for d in gh-pages/test-report/*/allure-report/history; do
              if [[ -d "$d" ]]; then
                mkdir -p target/allure-results/history
                cp -r "$d"/. target/allure-results/history/ || true
                break
              fi
            done
          fi

          mkdir -p "allure-history/${RUN}"
          "./allure-${ALLURE_VER}/bin/allure" generate target/allure-results -o "allure-history/${RUN}" --clean

      - name: Assemble GitHub Pages site (test-report / run id)
        if: always()
        run: |
          set -eux
          chmod +x scripts/assemble_gh_pages_site.sh
          scripts/assemble_gh_pages_site.sh "${{ github.run_number }}" gh-pages-site

      - name: Publish test report
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages-site
          keep_files: true

      - name: API coverage quality gate
        id: swagger_gate
        if: always()
        env:
          MIN_SWAGGER_COVERAGE: ${{ github.event.inputs.min_swagger_coverage || '50' }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y jq
          chmod +x scripts/check_swagger_coverage_gate.sh
          bash scripts/check_swagger_coverage_gate.sh target/swagger-coverage-metrics.json "$MIN_SWAGGER_COVERAGE"

      - name: Shutdown
        if: always()
        run: docker compose -f infra/docker-compose/docker-compose.yaml down