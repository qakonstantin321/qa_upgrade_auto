name: Run tests

on:
  workflow_dispatch:
    inputs:
      api_version:
        description: "Backend version tag (matches @pytest.mark.api_version(..))"
        required: true
        type: choice
        options:
          - with_database
          - with_fraud_check
      suite:
        description: "Which suite to run"
        required: true
        type: choice
        options:
          - api
          - ui
          - api+ui
        default: "api+ui"
      markers:
        description: "Additional pytest markers"
        required: false
        default: ""
      backend_tag:
        description: "Docker image tag for backend"
        required: true
        type: choice
        options:
          - with_database_with_fix
          - with_fraud_check
          - preprod_version
        default: "preprod_version"
      num_threads:
        description: "Number of parallel threads (default: 4)"
        required: false
        type: string
        default: "4"
      min_swagger_coverage:
        description: "Fail job if Swagger API coverage is below this percent (quality gate)"
        required: false
        type: string
        default: "50"
  push:
    branches: [ main, master, tests-in-pipeline, reports ]
    paths:
      - 'src/**'
      - 'swagger_coverage.py'
      - 'conftest.py'
      - 'Dockerfile'
      - '.github/workflows/**'
      - 'scripts/**'

jobs:
  run:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps

      - name: Checkstyle (flake8)
        run: |
          flake8 src/ --count --statistics

      - name: Start services
        env:
          BACKEND_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.backend_tag || 'preprod_version' }}
        run: |
          export NBANK_BACKEND_IMAGE="nobugsme/nbank:${BACKEND_TAG}"
          docker compose -f infra/docker-compose/docker-compose.yaml up -d

          docker compose -f infra/docker-compose/docker-compose.yaml logs -f backend &
          LOGS_PID=$!

          echo "Waiting for backend to be ready..."
          SECONDS=0
          until curl -sf "http://localhost:4111/actuator/health" >/dev/null 2>&1; do
            sleep 20
            if [ "$SECONDS" -ge 400 ]; then
              echo "Backend did not start within 400 seconds. Aborting tests."
              kill "$LOGS_PID" >/dev/null 2>&1 || true
              exit 1
            fi
            echo "Backend is not ready yet, healthcheck is unavailable..."
          done

          kill "$LOGS_PID" >/dev/null 2>&1 || true

      - name: Run pytest
        env:
          UI_BASE_URL: http://localhost:3000
          DB_HOST: localhost
          API_VERSION_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.api_version || 'with_database' }}
          SUITE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.suite || 'api+ui' }}
          MARKERS_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.markers || '' }}
          NUM_THREADS_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.num_threads || '4' }}
          SWAGGER_URL: http://localhost:4111/v3/api-docs
          SWAGGER_COVERAGE_REPORT: "0"
        run: |
          set -eux
          
          mkdir -p target/allure-results
          mkdir -p target/swagger-coverage-output
          
          API_VERSION_INPUT="${API_VERSION_INPUT:-with_database}"
          SUITE_INPUT="${SUITE_INPUT:-api+ui}"
          MARKERS="${MARKERS_INPUT:-}"
          NUM_THREADS="${NUM_THREADS_INPUT:-4}"
          
          M_OPT=""
          N_OPT="-n $NUM_THREADS"
          
          if [ -n "$MARKERS" ]; then
            M_OPT="-m $MARKERS"
          fi
          
          if [ "$SUITE_INPUT" = "api" ]; then
            pytest -m api --api-version "$API_VERSION_INPUT" $M_OPT $N_OPT -q --alluredir=target/allure-results
          elif [ "$SUITE_INPUT" = "ui" ]; then
            pytest -m ui $M_OPT $N_OPT -q --alluredir=target/allure-results
          else
            pytest -m api --api-version "$API_VERSION_INPUT" $M_OPT $N_OPT -q --alluredir=target/allure-results
            pytest -m ui $M_OPT $N_OPT -q --alluredir=target/allure-results
          fi

      - name: Generate Swagger Coverage Report
        if: always()
        env:
          SWAGGER_URL: http://localhost:4111/v3/api-docs
        run: |
          echo "Generating Swagger coverage report..."
          python -c "
          from swagger_coverage import get_swagger_coverage
          import os
          coverage = get_swagger_coverage()
          swagger_url = os.getenv('SWAGGER_URL', 'http://localhost:4111/v3/api-docs')
          report = coverage.generate_report(swagger_url)
          print(f'Report generated: {report}')
          "

      - name: API coverage quality gate
        id: swagger_gate
        if: always()
        env:
          # workflow_dispatch: значение из inputs; push и др.: по умолчанию 50
          MIN_SWAGGER_COVERAGE: ${{ github.event.inputs.min_swagger_coverage || '50' }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y jq
          chmod +x scripts/check_swagger_coverage_gate.sh
          bash scripts/check_swagger_coverage_gate.sh target/swagger-coverage-metrics.json "$MIN_SWAGGER_COVERAGE"

      - name: Load test report history
        uses: actions/checkout@v4
        if: always() && steps.swagger_gate.outcome == 'success'
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate allure report
        if: always() && steps.swagger_gate.outcome == 'success'
        env:
          ALLURE_VER: '2.27.0'
        run: |
          set -eux
          RUN="${{ github.run_number }}"
          wget -q "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VER}/allure-${ALLURE_VER}.tgz"
          tar -xzf "allure-${ALLURE_VER}.tgz"

          # История трендов из gh-pages (если уже публиковали)
          if [[ -d gh-pages/history ]]; then
            mkdir -p target/allure-results/history
            cp -r gh-pages/history/. target/allure-results/history/ || true
          else
            for d in gh-pages/test-report/*/allure-report/history; do
              if [[ -d "$d" ]]; then
                mkdir -p target/allure-results/history
                cp -r "$d"/. target/allure-results/history/ || true
                break
              fi
            done
          fi

          mkdir -p "allure-history/${RUN}"
          "./allure-${ALLURE_VER}/bin/allure" generate target/allure-results -o "allure-history/${RUN}" --clean

      - name: Assemble GitHub Pages site (test-report / run id)
        if: always() && steps.swagger_gate.outcome == 'success'
        run: |
          set -eux
          RUN="${{ github.run_number }}"
          SITE="gh-pages-site"
          mkdir -p "${SITE}/test-report/${RUN}/allure-report"
          mkdir -p "${SITE}/test-report/${RUN}/swagger-coverage/widgets"

          if [[ -d "allure-history/${RUN}" ]] && [[ -f "allure-history/${RUN}/index.html" ]]; then
            cp -r "allure-history/${RUN}/." "${SITE}/test-report/${RUN}/allure-report/"
          elif [[ -f "allure-history/index.html" ]]; then
            cp -r allure-history/. "${SITE}/test-report/${RUN}/allure-report/"
          else
            echo "Warning: Allure index not found; writing placeholder."
            echo '<!DOCTYPE html><html><body><p>Allure report unavailable for this run.</p></body></html>' > "${SITE}/test-report/${RUN}/allure-report/index.html"
          fi

          if [[ -f target/swagger-coverage-report.html ]]; then
            cp target/swagger-coverage-report.html "${SITE}/test-report/${RUN}/swagger-coverage/index.html"
          else
            echo '<!DOCTYPE html><html><body><p>Swagger coverage HTML missing.</p></body></html>' > "${SITE}/test-report/${RUN}/swagger-coverage/index.html"
          fi

          if [[ -f target/swagger-coverage-metrics.json ]]; then
            cp target/swagger-coverage-metrics.json "${SITE}/test-report/${RUN}/swagger-coverage/widgets/coverage.json"
          else
            echo '{"coverage_percent":0,"error":true}' > "${SITE}/test-report/${RUN}/swagger-coverage/widgets/coverage.json"
          fi

          if [[ -d target/swagger-coverage-output ]]; then
            mkdir -p "${SITE}/test-report/${RUN}/swagger-coverage/raw-calls"
            cp -r target/swagger-coverage-output/. "${SITE}/test-report/${RUN}/swagger-coverage/raw-calls/" 2>/dev/null || true
          fi

          cat > "${SITE}/index.html" << EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8" />
            <meta http-equiv="refresh" content="0; url=./test-report/${RUN}/allure-report/index.html" />
            <title>Test reports</title>
          </head>
          <body>
            <p><a href="./test-report/${RUN}/allure-report/index.html">Allure — run ${RUN}</a></p>
            <p><a href="./test-report/${RUN}/swagger-coverage/index.html">Swagger API coverage — run ${RUN}</a></p>
          </body>
          </html>
          EOF

          ALLURE_IDX="${SITE}/test-report/${RUN}/allure-report/index.html"
          if [[ -f "$ALLURE_IDX" ]]; then
            sed -i 's|</body>|<div style="position:fixed;bottom:16px;right:16px;z-index:9999"><a href="../swagger-coverage/index.html" target="_blank" style="background:#4CAF50;color:#fff;padding:10px 16px;text-decoration:none;border-radius:6px;font-family:sans-serif">API coverage</a></div></body>|' "$ALLURE_IDX"
          fi

      - name: Publish test report
        uses: peaceiris/actions-gh-pages@v4
        if: always() && steps.swagger_gate.outcome == 'success'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: gh-pages-site
          keep_files: true

      - name: Shutdown
        if: always()
        run: docker compose -f infra/docker-compose/docker-compose.yaml down