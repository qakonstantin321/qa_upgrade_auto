name: Run tests

on:
  workflow_dispatch:
    inputs:
      api_version:
        description: "Backend version tag (matches @pytest.mark.api_version(..))"
        required: true
        type: choice
        options:
          - with_database
          - with_fraud_check
      suite:
        description: "Which suite to run"
        required: true
        type: choice
        options:
          - api
          - ui
          - api+ui
      markers:
        description: "Additional pytest markers"
        required: false
        default: ""
      backend_tag:
        description: "Docker image tag for backend"
        required: true
        type: choice
        options:
          - with_database_with_fix
          - with_fraud_check
          - preprod_version
        default: "preprod_version"
      num_threads:
        description: "Number of parallel threads (default: 4)"
        required: false
        type: string
        default: "4"
  push:
    branches: [ main, master, tests-in-pipeline ]
    paths:
      - 'src/**'

jobs:
  run:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8
          playwright install --with-deps

      - name: Checkstyle (flake8)
        run: |
          flake8 src/ --count --statistics

      - name: Start services
        env:
          BACKEND_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.backend_tag || 'preprod_version' }}
        run: |
          export NBANK_BACKEND_IMAGE="nobugsme/nbank:${BACKEND_TAG}"
          docker compose -f infra/docker-compose/docker-compose.yaml up -d

          docker compose -f infra/docker-compose/docker-compose.yaml logs -f backend &
          LOGS_PID=$!

          echo "Waiting for backend to be ready..."
          SECONDS=0
          until curl -sf "http://localhost:4111/actuator/health" >/dev/null 2>&1; do
            sleep 20
            if [ "$SECONDS" -ge 400 ]; then
              echo "Backend did not start within 400 seconds. Aborting tests."
              kill "$LOGS_PID" >/dev/null 2>&1 || true
              exit 1
            fi
            echo "Backend is not ready yet, healthcheck is unavailable..."
          done

          kill "$LOGS_PID" >/dev/null 2>&1 || true

      - name: Run pytest
        env:
          UI_BASE_URL: http://localhost:3000
          DB_HOST: localhost
          API_VERSION_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.api_version || 'with_database' }}
          SUITE_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.suite || 'api' }}
          MARKERS_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.markers || '' }}
          NUM_THREADS_INPUT: ${{ github.event_name == 'workflow_dispatch' && inputs.num_threads || '4' }}
        run: |
          set -eux
          
          API_VERSION_INPUT="${API_VERSION_INPUT:-with_database}"
          SUITE_INPUT="${SUITE_INPUT:-api}"
          MARKERS="${MARKERS_INPUT:-}"
          NUM_THREADS="${NUM_THREADS_INPUT:-4}"
          
          M_OPT=""
          N_OPT="-n $NUM_THREADS"
          
          if [ -n "$MARKERS" ]; then
            M_OPT="-m $MARKERS"
          fi
          
          if [ "$SUITE_INPUT" = "api" ]; then
            pytest -m api --api-version "$API_VERSION_INPUT" $M_OPT $N_OPT -q
          elif [ "$SUITE_INPUT" = "ui" ]; then
            pytest -m ui $M_OPT $N_OPT -q
          else
            pytest -m api --api-version "$API_VERSION_INPUT" $M_OPT $N_OPT -q
            pytest -m ui $M_OPT $N_OPT -q
          fi

      - name: Build Docker image
        if: github.event_name == 'push' && success()
        env:
          TAG: ${{ github.sha }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_NAME: "autotests"
        run: |
          echo "Building Docker image: ${IMAGE_NAME}:${TAG}"
          docker build -t "${IMAGE_NAME}:${TAG}" .

      - name: Login to Docker Hub
        if: github.event_name == 'push' && success()
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image to Docker Hub
        if: github.event_name == 'push' && success()
        env:
          TAG: ${{ github.sha }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_NAME: "autotests"
        run: |
          FULL_IMAGE_NAME="${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${TAG}"
          docker tag "${IMAGE_NAME}:${TAG}" "${FULL_IMAGE_NAME}"
          docker push "${FULL_IMAGE_NAME}"
          
          echo "Образ успешно загружен: ${FULL_IMAGE_NAME}"
          echo "Для скачивания образа выполните:"
          echo "docker pull ${FULL_IMAGE_NAME}"

      - name: Shutdown
        if: always()
        run: docker compose -f infra/docker-compose/docker-compose.yaml down